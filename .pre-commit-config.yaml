# Install: just install  (runs pre-commit install + pre-push hook)
# Manual: pre-commit run --all-files
# Before push: just prepush

repos:
  - repo: local
    hooks:
      - id: just-check
        name: just check
        entry: just check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: just-prepush
        name: just prepush
        entry: just prepush
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
